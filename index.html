<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FANTANA–A LITTLE SLICE OF DESIGN HEAVEN</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&display=swap"
            rel="stylesheet"
        />
        <link href="styles.css" rel="stylesheet" />
    </head>
    <body>
        <a class="splash-link" href="work.html"
            ><section class="splash">
                <div class="border border--splash"></div>
                <span class="splash-letter consonant" data-letter="f">F</span>
                <span class="splash-letter vowel" data-letter="a">a</span>
                <span class="splash-letter consonant" data-letter="first-n"
                    >n</span
                >
                <span class="splash-letter consonant" data-letter="t">t</span>
                <span class="splash-letter vowel" data-letter="a">a</span>
                <span class="splash-letter consonant" data-letter="second-n"
                    >n</span
                >
                <span class="splash-letter vowel" data-letter="a">a</span>
            </section></a
        >
        <script src="splash.js"></script>
    </body>
</html>
